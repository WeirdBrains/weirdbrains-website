pid /tmp/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # sendfile is NOT supported by gVisor (Cloud Run sandbox)
  sendfile      off;

  # Log to stdout/stderr for Cloud Run logging
  access_log  /dev/stdout combined;
  error_log   /dev/stderr warn;

  gzip          on;
  gzip_types    text/plain text/css application/json application/javascript text/xml application/xml application/x-font-ttf font/opentype image/svg+xml;

  server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Flutter Web SPA routing
    location / {
      try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # Cloud Run health check endpoint
    location /health {
      access_log off;
      return 200 "ok";
      add_header Content-Type text/plain;
    }
  }
}
