steps:
  - name: 'ghcr.io/cirruslabs/flutter:stable'
    entrypoint: flutter
    args: ['build', 'web', '--release', '--base-href', '/']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/mandible-production/mandible-prod/weirdbrains-website:$COMMIT_SHA
      - -t
      - us-central1-docker.pkg.dev/mandible-production/mandible-prod/weirdbrains-website:latest
      - .

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'us-central1-docker.pkg.dev/mandible-production/mandible-prod/weirdbrains-website']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - weirdbrains-website
      - --image=us-central1-docker.pkg.dev/mandible-production/mandible-prod/weirdbrains-website:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=256Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --port=8080

timeout: '1200s'
options:
  logging: CLOUD_LOGGING_ONLY
