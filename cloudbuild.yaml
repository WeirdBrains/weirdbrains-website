steps:
  - name: 'ghcr.io/cirruslabs/flutter:stable'
    entrypoint: flutter
    args: ['build', 'web', '--release', '--base-href', '/']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/mandible-production/weirdbrains-website:$COMMIT_SHA
      - -t
      - gcr.io/mandible-production/weirdbrains-website:latest
      - .

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/mandible-production/weirdbrains-website']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - weirdbrains-website
      - --image=gcr.io/mandible-production/weirdbrains-website:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=256Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5

timeout: '1200s'
options:
  logging: CLOUD_LOGGING_ONLY
